<!DOCTYPE html>
<html>
<head>
    <title>CleanPro Admin Panel</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        
        body {
            background: #f5f7fa;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-success {
            background: #2ecc71;
            color: white;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .service-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .price-badge {
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛠 CleanPro Admin Panel</h1>
        <button onclick="logout()" class="btn btn-danger">
            🚪 Выйти
        </button>
    </div>

    <div class="card">
        <h2>➕ Добавить услугу</h2>
        <input type="text" id="serviceName" class="form-control" placeholder="Название услуги">
        <input type="number" id="servicePrice" class="form-control" placeholder="Цена">
        <button onclick="addService()" class="btn btn-success">
            ✅ Добавить
        </button>
    </div>

    <div class="card">
        <h2>📋 Услуги и цены</h2>
        <div id="servicesList"></div>
    </div>

    <script>
        // =============================================
        // ПРОВЕРКА АВТОРИЗАЦИИ - ИСПРАВЛЕНО!
        // =============================================
        
        // УБИРАЕМ АВТОМАТИЧЕСКИЙ РЕДИРЕКТ!
        // Вместо этого просто проверяем и показываем сообщение
        
        const isLoggedIn = localStorage.getItem('adminLoggedIn');
        if (!isLoggedIn) {
            document.body.innerHTML = `
                <div style="max-width: 400px; margin: 100px auto; text-align: center; padding: 40px; background: white; border-radius: 15px;">
                    <h2 style="color: #e74c3c; margin-bottom: 20px;">❌ Доступ запрещен</h2>
                    <p style="margin-bottom: 20px;">Пожалуйста, войдите через admin.html</p>
                    <a href="admin.html" style="display: inline-block; padding: 12px 24px; background: #3498db; color: white; text-decoration: none; border-radius: 8px;">Войти</a>
                </div>
            `;
            throw new Error('Not authorized');
        }

        // =============================================
        // СТАНДАРТНЫЕ УСЛУГИ
        // =============================================
        
        const DEFAULT_SERVICES = [
            { name: 'Диван (2-местный)', price: 600 },
            { name: 'Кресло', price: 350 },
            { name: 'Матрас', price: 450 },
            { name: 'Ковёр (м²)', price: 180 },
            { name: 'Автомобиль', price: 1200 },
            { name: 'Шторы', price: 250 },
            { name: 'Стул', price: 150 }
        ];

        // =============================================
        // ЗАГРУЗКА УСЛУГ
        // =============================================
        
        function loadServices() {
            let services = JSON.parse(localStorage.getItem('adminServices'));
            
            if (!services || services.length === 0) {
                services = DEFAULT_SERVICES;
                localStorage.setItem('adminServices', JSON.stringify(services));
            }

            let html = '';
            services.forEach((service, index) => {
                html += `
                    <div class="service-item">
                        <div>
                            <strong>${service.name}</strong>
                        </div>
                        <div>
                            <span class="price-badge">${service.price} TL</span>
                            <button onclick="editPrice(${index})" style="margin-left: 10px; padding: 5px 10px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">✏️</button>
                            <button onclick="deleteService(${index})" style="margin-left: 5px; padding: 5px 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer;">🗑️</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('servicesList').innerHTML = html;
        }

        // =============================================
        // ДОБАВЛЕНИЕ УСЛУГИ
        // =============================================
        
        function addService() {
            const name = document.getElementById('serviceName').value.trim();
            const price = document.getElementById('servicePrice').value.trim();

            if (!name || !price) {
                alert('❌ Заполните название и цену!');
                return;
            }

            let services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            
            services.push({
                name: name,
                price: parseInt(price)
            });

            localStorage.setItem('adminServices', JSON.stringify(services));
            
            document.getElementById('serviceName').value = '';
            document.getElementById('servicePrice').value = '';
            
            loadServices();
            alert('✅ Услуга добавлена!');
        }

        // =============================================
        // РЕДАКТИРОВАНИЕ ЦЕНЫ
        // =============================================
        
        function editPrice(index) {
            let services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            const service = services[index];
            
            const newPrice = prompt(`Новая цена для ${service.name}:`, service.price);
            
            if (newPrice && !isNaN(newPrice) && newPrice > 0) {
                service.price = parseInt(newPrice);
                localStorage.setItem('adminServices', JSON.stringify(services));
                loadServices();
                alert('✅ Цена обновлена!');
            }
        }

        // =============================================
        // УДАЛЕНИЕ УСЛУГИ
        // =============================================
        
        function deleteService(index) {
            if (confirm('Удалить услугу?')) {
                let services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
                services.splice(index, 1);
                localStorage.setItem('adminServices', JSON.stringify(services));
                loadServices();
            }
        }

        // =============================================
        // ПРИМЕНЕНИЕ К САЙТУ
        // =============================================
        
        function applyToSite() {
            const services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            
            // Сохраняем для сайта
            localStorage.setItem('sitePrices', JSON.stringify(services));
            
            alert(`✅ Цены сохранены!\n\nТеперь откройте основной сайт и обновите страницу (F5)`);
            
            // Открываем основной сайт
            window.open('https://nepes89-hue.github.io/cleaning-istanbul/', '_blank');
        }

        // =============================================
        // ВЫХОД
        // =============================================
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin.html';
        }

        // =============================================
        // ЗАГРУЗКА ПРИ СТАРТЕ
        // =============================================
        
        loadServices();
        
        // Добавляем кнопку применения в шапку
        const header = document.querySelector('.header');
        const applyButton = document.createElement('button');
        applyButton.className = 'btn btn-primary';
        applyButton.style.marginLeft = '10px';
        applyButton.innerHTML = '✅ Применить к сайту';
        applyButton.onclick = applyToSite;
        header.appendChild(applyButton);
        
    </script>
</body>
</html>
