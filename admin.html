<!DOCTYPE html>
<html>
<head>
    <title>CleanPro Admin Panel</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        
        body {
            background: #f5f7fa;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .header h1 {
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }
        
        .stat-card h3 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }
        
        .form-control:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-success {
            background: #2ecc71;
            color: white;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .service-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .price-badge {
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 5px solid #2ecc71;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 5px solid #17a2b8;
        }
        
        .language-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }
        
        .lang-tab {
            padding: 10px 20px;
            border: none;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .lang-tab.active {
            background: #667eea;
            color: white;
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .service-row {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            🛠 CleanPro Istanbul
            <span style="font-size: 14px; background: #667eea; color: white; padding: 5px 10px; border-radius: 20px;">Админ-панель</span>
        </h1>
        <div>
            <button onclick="syncToSite()" class="btn btn-warning" style="margin-right: 10px;">
                🔄 Синхронизировать с сайтом
            </button>
            <button onclick="logout()" class="btn btn-danger">
                🚪 Выйти
            </button>
        </div>
    </div>

    <div id="syncAlert" class="alert alert-info" style="display: none;">
        ⚡ Изменения применены к сайту!
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3 id="statReg">0</h3>
            <p>Всего регистраций</p>
        </div>
        <div class="stat-card">
            <h3 id="statOrders">0</h3>
            <p>Всего заявок</p>
        </div>
        <div class="stat-card">
            <h3 id="statServices">0</h3>
            <p>Активных услуг</p>
        </div>
    </div>

    <div class="card">
        <h2>➕ Добавить новую услугу</h2>
        <div class="language-tabs">
            <button onclick="setLanguage('ru')" id="langRu" class="lang-tab active">🇷🇺 Русский</button>
            <button onclick="setLanguage('en')" id="langEn" class="lang-tab">🇺🇸 English</button>
            <button onclick="setLanguage('tr')" id="langTr" class="lang-tab">🇹🇷 Türkçe</button>
        </div>
        
        <div class="form-grid">
            <div class="form-group">
                <label>Название услуги</label>
                <input type="text" id="serviceName" class="form-control" placeholder="Например: Химчистка дивана">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <input type="text" id="serviceDesc" class="form-control" placeholder="Краткое описание">
            </div>
            <div class="form-group">
                <label>Цена от (TL)</label>
                <input type="number" id="servicePrice" class="form-control" placeholder="600">
            </div>
            <div class="form-group">
                <label>Цена до (TL)</label>
                <input type="number" id="servicePriceMax" class="form-control" placeholder="900">
            </div>
        </div>
        <button onclick="addService()" class="btn btn-success">
            ✅ Добавить услугу
        </button>
    </div>

    <div class="card">
        <h2>📋 Управление услугами и ценами</h2>
        <div style="margin-bottom: 20px;">
            <select id="languageFilter" onchange="filterServices()" class="form-control" style="width: 200px;">
                <option value="ru">Русский</option>
                <option value="en">English</option>
                <option value="tr">Türkçe</option>
            </select>
        </div>
        <div id="servicesContainer">
            <!-- JavaScript загрузит сюда -->
        </div>
    </div>

    <div class="card">
        <h2>📊 Последние регистрации</h2>
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Имя</th>
                    <th>Телефон</th>
                    <th>Скидка</th>
                </tr>
            </thead>
            <tbody id="clientsTable">
                <!-- JavaScript загрузит сюда -->
            </tbody>
        </table>
    </div>

    <script>
        // ПРОВЕРКА АВТОРИЗАЦИИ
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = 'admin.html';
        }

        let currentLang = 'ru';

        // СТАНДАРТНЫЕ УСЛУГИ (все языки)
        const DEFAULT_SERVICES = {
            ru: [
                { name: 'Диван (2-местный)', desc: 'Полная химчистка', price: 600, priceMax: 900 },
                { name: 'Кресло', desc: 'Обивка любого типа', price: 350, priceMax: 600 },
                { name: 'Матрас', desc: 'Двусторонняя чистка', price: 450, priceMax: 700 },
                { name: 'Ковёр (м²)', desc: 'В зависимости от загрязнения', price: 180, priceMax: 350 },
                { name: 'Автомобиль', desc: 'Комплексная чистка салона', price: 1200, priceMax: 2500 },
                { name: 'Шторы', desc: 'Химчистка штор', price: 250, priceMax: 500 },
                { name: 'Стул', desc: 'Чистка стульев', price: 150, priceMax: 300 }
            ],
            en: [
                { name: 'Sofa (2-seater)', desc: 'Complete dry cleaning', price: 600, priceMax: 900 },
                { name: 'Armchair', desc: 'Any upholstery type', price: 350, priceMax: 600 },
                { name: 'Mattress', desc: 'Two-sided cleaning', price: 450, priceMax: 700 },
                { name: 'Carpet (m²)', desc: 'Depending on soiling', price: 180, priceMax: 350 },
                { name: 'Car', desc: 'Complete interior cleaning', price: 1200, priceMax: 2500 },
                { name: 'Curtains', desc: 'Curtain cleaning', price: 250, priceMax: 500 },
                { name: 'Chair', desc: 'Chair cleaning', price: 150, priceMax: 300 }
            ],
            tr: [
                { name: 'Kanepe (2 kişilik)', desc: 'Tam kuru temizleme', price: 600, priceMax: 900 },
                { name: 'Koltuk', desc: 'Her türlü döşeme', price: 350, priceMax: 600 },
                { name: 'Yatak', desc: 'Çift taraflı temizlik', price: 450, priceMax: 700 },
                { name: 'Halı (m²)', desc: 'Kirlilik durumuna göre', price: 180, priceMax: 350 },
                { name: 'Araç', desc: 'Tam iç temizlik', price: 1200, priceMax: 2500 },
                { name: 'Perde', desc: 'Perde temizliği', price: 250, priceMax: 500 },
                { name: 'Sandalye', desc: 'Sandalye temizliği', price: 150, priceMax: 300 }
            ]
        };

        // =============================================
        // УПРАВЛЕНИЕ ЯЗЫКАМИ
        // =============================================
        
        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(`lang${lang.toUpperCase()}`).classList.add('active');
        }

        // =============================================
        // ЗАГРУЗКА ДАННЫХ
        // =============================================
        
        function loadServices() {
            let allServices = JSON.parse(localStorage.getItem('adminServices'));
            
            if (!allServices) {
                allServices = DEFAULT_SERVICES;
                localStorage.setItem('adminServices', JSON.stringify(allServices));
            }

            const lang = document.getElementById('languageFilter').value;
            const services = allServices[lang] || allServices.ru;
            
            let html = '';
            services.forEach((service, index) => {
                html += `
                    <div class="service-row">
                        <div style="flex: 2;">
                            <strong>${service.name}</strong><br>
                            <span style="color: #666; font-size: 13px;">${service.desc || ''}</span>
                        </div>
                        <div style="flex: 1; text-align: center;">
                            <span class="price-badge">${service.price} - ${service.priceMax || service.price + 300} TL</span>
                        </div>
                        <div style="flex: 1; text-align: right;">
                            <button onclick="editPrice(${index})" class="btn btn-primary btn-sm">✏️ Цена</button>
                            <button onclick="editName(${index})" class="btn btn-warning btn-sm">📝 Название</button>
                            <button onclick="deleteService(${index})" class="btn btn-danger btn-sm">🗑️</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('servicesContainer').innerHTML = html;
            
            // Подсчет всех услуг
            let totalServices = 0;
            Object.keys(allServices).forEach(key => {
                totalServices += allServices[key].length;
            });
            document.getElementById('statServices').textContent = totalServices;
        }

        function filterServices() {
            loadServices();
        }

        // =============================================
        // ДОБАВЛЕНИЕ УСЛУГИ
        // =============================================
        
        function addService() {
            const name = document.getElementById('serviceName').value.trim();
            const desc = document.getElementById('serviceDesc').value.trim();
            const price = document.getElementById('servicePrice').value.trim();
            const priceMax = document.getElementById('servicePriceMax').value.trim();

            if (!name || !price) {
                alert('❌ Заполните название и цену!');
                return;
            }

            let allServices = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            
            // Добавляем на ВСЕХ языках
            allServices.ru.push({
                name: name,
                desc: desc,
                price: parseInt(price),
                priceMax: parseInt(priceMax) || parseInt(price) + 300
            });
            
            allServices.en.push({
                name: name, // Здесь нужно будет перевести вручную
                desc: desc,
                price: parseInt(price),
                priceMax: parseInt(priceMax) || parseInt(price) + 300
            });
            
            allServices.tr.push({
                name: name, // Здесь нужно будет перевести вручную
                desc: desc,
                price: parseInt(price),
                priceMax: parseInt(priceMax) || parseInt(price) + 300
            });

            localStorage.setItem('adminServices', JSON.stringify(allServices));
            
            // Очищаем поля
            document.getElementById('serviceName').value = '';
            document.getElementById('serviceDesc').value = '';
            document.getElementById('servicePrice').value = '';
            document.getElementById('servicePriceMax').value = '';
            
            loadServices();
            alert('✅ Услуга добавлена! Не забудьте перевести названия на другие языки в админ-панели.');
        }

        // =============================================
        // РЕДАКТИРОВАНИЕ
        // =============================================
        
        function editPrice(index) {
            const lang = document.getElementById('languageFilter').value;
            let allServices = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            const service = allServices[lang][index];
            
            const newPrice = prompt(`Введите новую цену для "${service.name}":`, service.price);
            const newPriceMax = prompt(`Введите максимальную цену:`, service.priceMax || service.price + 300);
            
            if (newPrice && !isNaN(newPrice) && newPrice > 0) {
                // Обновляем на ВСЕХ языках
                Object.keys(allServices).forEach(key => {
                    if (allServices[key][index] && allServices[key][index].name === service.name) {
                        allServices[key][index].price = parseInt(newPrice);
                        allServices[key][index].priceMax = parseInt(newPriceMax) || parseInt(newPrice) + 300;
                    }
                });
                
                localStorage.setItem('adminServices', JSON.stringify(allServices));
                loadServices();
                alert('✅ Цена обновлена на всех языках!');
            }
        }

        function editName(index) {
            const lang = document.getElementById('languageFilter').value;
            let allServices = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            const service = allServices[lang][index];
            
            const newName = prompt(`Введите новое название (${lang.toUpperCase()}):`, service.name);
            
            if (newName && newName.trim()) {
                allServices[lang][index].name = newName.trim();
                localStorage.setItem('adminServices', JSON.stringify(allServices));
                loadServices();
                alert(`✅ Название обновлено для языка ${lang.toUpperCase()}`);
            }
        }

        function deleteService(index) {
            if (confirm('Удалить эту услугу?')) {
                let allServices = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
                
                // Удаляем на ВСЕХ языках
                Object.keys(allServices).forEach(key => {
                    if (allServices[key][index]) {
                        allServices[key].splice(index, 1);
                    }
                });
                
                localStorage.setItem('adminServices', JSON.stringify(allServices));
                loadServices();
            }
        }

        // =============================================
        // СИНХРОНИЗАЦИЯ С САЙТОМ (ГЛАВНОЕ!)
        // =============================================
        
        function syncToSite() {
            const allServices = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            
            // Сохраняем в localStorage для основного сайта
            localStorage.setItem('sitePrices', JSON.stringify(allServices));
            
            // Создаем JSON файл для скачивания
            const dataStr = JSON.stringify(allServices, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            
            // Создаем ссылку для скачивания
            const a = document.createElement('a');
            a.href = url;
            a.download = `cleanpro-prices-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // Показываем инструкцию
            const alertBox = document.getElementById('syncAlert');
            alertBox.style.display = 'block';
            alertBox.innerHTML = `
                <strong>✅ Цены сохранены!</strong><br>
                1. Файл с ценами скачан на ваш компьютер<br>
                2. Чтобы применить на сайте - загрузите файл в репозиторий как prices.json<br>
                3. Или обновите HTML файлы вручную
            `;
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 10000);
            
            console.log('✅ Цены синхронизированы:', allServices);
        }

        // =============================================
        // ЗАГРУЗКА КЛИЕНТОВ
        // =============================================
        
        function loadClients() {
            const db = JSON.parse(localStorage.getItem('cleaningDatabase') || '{"registrations":[]}');
            
            let html = '';
            const registrations = db.registrations || [];
            
            registrations.slice(-10).reverse().forEach(client => {
                html += `<tr>
                    <td>${new Date(client.timestamp).toLocaleDateString()}</td>
                    <td>${client.name || '—'}</td>
                    <td>${client.phone || '—'}</td>
                    <td><span style="background: #2ecc71; color: white; padding: 3px 8px; border-radius: 4px;">${client.discount || 0}%</span></td>
                </tr>`;
            });

            document.getElementById('clientsTable').innerHTML = html;
            document.getElementById('statReg').textContent = registrations.length;
            document.getElementById('statOrders').textContent = db.orders?.length || 0;
        }

        // =============================================
        // ВЫХОД
        // =============================================
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin.html';
        }

        // =============================================
        // ЗАГРУЗКА ПРИ СТАРТЕ
        // =============================================
        
        loadServices();
        loadClients();
    </script>
</body>
</html>
