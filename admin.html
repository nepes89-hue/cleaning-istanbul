<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanPro Istanbul - Админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-header h1 i {
            color: #e74c3c;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .stat-card h3 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .admin-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .admin-card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        .services-list {
            margin-top: 20px;
        }

        .service-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            border-left: 4px solid #667eea;
        }

        .service-item:hover {
            background: #f1f3f5;
            transform: translateX(5px);
        }

        .service-info h4 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .service-info p {
            color: #666;
            font-size: 0.9rem;
        }

        .service-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: #e74c3c;
        }

        .service-actions {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .language-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .lang-tab {
            padding: 10px 20px;
            background: #f8f9fa;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .lang-tab.active {
            background: #667eea;
            color: white;
        }

        .lang-tab:hover {
            background: #667eea;
            color: white;
        }

        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .price-table th {
            background: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
        }

        .price-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .price-table tr:hover {
            background: #f8f9fa;
        }

        .alert {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideDown 0.3s ease;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 5px solid #2ecc71;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .sync-section {
            background: linear-gradient(135deg, #f9f9f9, #f1f1f1);
            border: 2px dashed #667eea;
        }

        @media (max-width: 768px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .service-item {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .service-actions {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="loginForm" style="max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">
            <i class="fas fa-lock" style="color: #667eea;"></i> Вход в админ-панель
        </h2>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="adminPassword" class="form-control" placeholder="Введите пароль">
        </div>
        <button onclick="login()" class="btn btn-primary" style="width: 100%;">
            <i class="fas fa-sign-in-alt"></i> Войти
        </button>
        <p style="text-align: center; margin-top: 20px; color: #666;">
            Пароль: <strong>admin123</strong>
        </p>
    </div>

    <div id="adminPanel" style="display: none;">
        <div class="admin-container">
            <!-- ШАПКА -->
            <div class="admin-header">
                <h1>
                    <i class="fas fa-crown" style="color: #f39c12;"></i>
                    CleanPro Istanbul
                    <span style="font-size: 14px; background: #667eea; color: white; padding: 5px 15px; border-radius: 20px; margin-left: 10px;">
                        Админ-панель
                    </span>
                </h1>
                <div>
                    <button onclick="syncToSite()" class="btn btn-warning" style="margin-right: 10px;">
                        <i class="fas fa-sync-alt"></i> Синхронизировать с сайтом
                    </button>
                    <button onclick="logout()" class="btn btn-danger">
                        <i class="fas fa-sign-out-alt"></i> Выйти
                    </button>
                </div>
            </div>

            <!-- УВЕДОМЛЕНИЕ -->
            <div id="syncAlert" class="alert alert-success" style="display: none;">
                <i class="fas fa-check-circle" style="font-size: 24px;"></i>
                <div>
                    <strong>✅ Синхронизация выполнена!</strong><br>
                    <span id="syncMessage">Цены сохранены и готовы к применению на сайте</span>
                </div>
            </div>

            <!-- СТАТИСТИКА -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="totalRegistrations">0</h3>
                    <p><i class="fas fa-users"></i> Всего регистраций</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalOrders">0</h3>
                    <p><i class="fas fa-shopping-cart"></i> Всего заявок</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalServices">0</h3>
                    <p><i class="fas fa-tags"></i> Активных услуг</p>
                </div>
            </div>

            <div class="admin-grid">
                <!-- ЛЕВАЯ КОЛОНКА: ДОБАВЛЕНИЕ УСЛУГ -->
                <div class="admin-card">
                    <h2>
                        <i class="fas fa-plus-circle" style="color: #2ecc71;"></i>
                        Добавить новую услугу
                    </h2>
                    
                    <div class="language-tabs">
                        <button onclick="setLanguage('ru')" id="langRu" class="lang-tab active">
                            <i class="fas fa-language"></i> Русский
                        </button>
                        <button onclick="setLanguage('en')" id="langEn" class="lang-tab">
                            <i class="fas fa-language"></i> English
                        </button>
                        <button onclick="setLanguage('tr')" id="langTr" class="lang-tab">
                            <i class="fas fa-language"></i> Türkçe
                        </button>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Название услуги</label>
                        <input type="text" id="serviceName" class="form-control" placeholder="Например: Химчистка дивана">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-align-left"></i> Описание</label>
                        <textarea id="serviceDesc" class="form-control" rows="2" placeholder="Краткое описание услуги..."></textarea>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label><i class="fas fa-turkish-lira"></i> Цена от (TL)</label>
                            <input type="number" id="servicePrice" class="form-control" placeholder="600">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-turkish-lira"></i> Цена до (TL)</label>
                            <input type="number" id="servicePriceMax" class="form-control" placeholder="900">
                        </div>
                    </div>

                    <button onclick="addService()" class="btn btn-success" style="width: 100%;">
                        <i class="fas fa-plus"></i> Добавить услугу
                    </button>
                </div>

                <!-- ПРАВАЯ КОЛОНКА: УПРАВЛЕНИЕ ЦЕНАМИ -->
                <div class="admin-card">
                    <h2>
                        <i class="fas fa-tags" style="color: #f39c12;"></i>
                        Управление ценами
                    </h2>

                    <div style="margin-bottom: 20px;">
                        <label><i class="fas fa-filter"></i> Фильтр по языку</label>
                        <select id="langFilter" onchange="filterServices()" class="form-control">
                            <option value="ru">🇷🇺 Русский</option>
                            <option value="en">🇺🇸 English</option>
                            <option value="tr">🇹🇷 Türkçe</option>
                        </select>
                    </div>

                    <div id="servicesList" class="services-list">
                        <!-- Список услуг загрузится сюда -->
                    </div>
                </div>
            </div>

            <!-- ТАБЛИЦА ЦЕН -->
            <div class="admin-card">
                <h2>
                    <i class="fas fa-table" style="color: #3498db;"></i>
                    Все цены (таблица)
                </h2>

                <table class="price-table">
                    <thead>
                        <tr>
                            <th>Услуга</th>
                            <th>Описание</th>
                            <th>Цена (TL)</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="priceTableBody">
                        <!-- Данные загрузятся сюда -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // АВТОРИЗАЦИЯ
        // =============================================
        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadServices();
                loadStats();
            } else {
                alert('❌ Неверный пароль!');
            }
        }

        function logout() {
            if (confirm('Выйти из админ-панели?')) {
                localStorage.removeItem('adminLoggedIn');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
            }
        }

        // Проверка авторизации при загрузке
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        }

        // =============================================
        // НАСТРОЙКИ
        // =============================================
        let currentLang = 'ru';

        // Стандартные услуги
        const DEFAULT_SERVICES = {
            ru: [
                { name: 'Диван (2-местный)', desc: 'Полная химчистка, удаление любых пятен', price: 600, priceMax: 900 },
                { name: 'Кресло', desc: 'Обивка любого типа, восстановление цвета', price: 350, priceMax: 600 },
                { name: 'Матрас', desc: 'Двусторонняя чистка, удаление пылевых клещей', price: 450, priceMax: 700 },
                { name: 'Ковёр (м²)', desc: 'В зависимости от загрязнения, выездная чистка', price: 180, priceMax: 350 },
                { name: 'Автомобиль', desc: 'Комплексная чистка салона, удаление запахов', price: 1200, priceMax: 2500 },
                { name: 'Шторы', desc: 'Химчистка штор любой длины', price: 250, priceMax: 500 },
                { name: 'Стул', desc: 'Чистка стульев и мягких сидений', price: 150, priceMax: 300 }
            ],
            en: [
                { name: 'Sofa (2-seater)', desc: 'Complete dry cleaning, any stains', price: 600, priceMax: 900 },
                { name: 'Armchair', desc: 'Any upholstery type, color restoration', price: 350, priceMax: 600 },
                { name: 'Mattress', desc: 'Two-sided cleaning, dust mites removal', price: 450, priceMax: 700 },
                { name: 'Carpet (m²)', desc: 'Depending on soiling, on-site cleaning', price: 180, priceMax: 350 },
                { name: 'Car', desc: 'Complete interior cleaning, odor removal', price: 1200, priceMax: 2500 },
                { name: 'Curtains', desc: 'Curtain dry cleaning, any length', price: 250, priceMax: 500 },
                { name: 'Chair', desc: 'Chair and seat cleaning', price: 150, priceMax: 300 }
            ],
            tr: [
                { name: 'Kanepe (2 kişilik)', desc: 'Tam kuru temizleme, tüm lekeler', price: 600, priceMax: 900 },
                { name: 'Koltuk', desc: 'Her türlü döşeme, renk canlandırma', price: 350, priceMax: 600 },
                { name: 'Yatak', desc: 'Çift taraflı temizlik, toz akarları', price: 450, priceMax: 700 },
                { name: 'Halı (m²)', desc: 'Kirliliğe göre, yerinde temizlik', price: 180, priceMax: 350 },
                { name: 'Araç', desc: 'Tam iç temizlik, koku giderme', price: 1200, priceMax: 2500 },
                { name: 'Perde', desc: 'Perde kuru temizleme', price: 250, priceMax: 500 },
                { name: 'Sandalye', desc: 'Sandalye temizliği', price: 150, priceMax: 300 }
            ]
        };

        // =============================================
        // ЗАГРУЗКА ДАННЫХ
        // =============================================
        function loadServices() {
            let services = localStorage.getItem('adminServices');
            
            if (!services) {
                services = DEFAULT_SERVICES;
                localStorage.setItem('adminServices', JSON.stringify(services));
            } else {
                services = JSON.parse(services);
            }

            const filterLang = document.getElementById('langFilter')?.value || 'ru';
            const currentServices = services[filterLang] || services.ru;

            // Загружаем список услуг
            let html = '';
            currentServices.forEach((service, index) => {
                html += `
                    <div class="service-item">
                        <div class="service-info">
                            <h4>${service.name}</h4>
                            <p>${service.desc || ''}</p>
                        </div>
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <span class="service-price">${service.price} - ${service.priceMax || service.price + 300} TL</span>
                            <div class="service-actions">
                                <button onclick="editPrice(${index})" class="btn btn-primary btn-sm">
                                    <i class="fas fa-edit"></i> Цена
                                </button>
                                <button onclick="editName(${index})" class="btn btn-warning btn-sm">
                                    <i class="fas fa-pencil-alt"></i> Название
                                </button>
                                <button onclick="deleteService(${index})" class="btn btn-danger btn-sm">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('servicesList').innerHTML = html;

            // Загружаем таблицу цен
            let tableHtml = '';
            Object.keys(services).forEach(lang => {
                services[lang].forEach((service, idx) => {
                    tableHtml += `
                        <tr>
                            <td><strong>${service.name}</strong> (${lang.toUpperCase()})</td>
                            <td>${service.desc || ''}</td>
                            <td>${service.price} - ${service.priceMax || service.price + 300} TL</td>
                            <td>
                                <button onclick="editPriceGlobal('${lang}', ${idx})" class="btn btn-primary btn-sm">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            });
            document.getElementById('priceTableBody').innerHTML = tableHtml;

            // Подсчет количества услуг
            let totalServices = 0;
            Object.keys(services).forEach(lang => {
                totalServices += services[lang].length;
            });
            document.getElementById('totalServices').textContent = totalServices;
        }

        function filterServices() {
            loadServices();
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(`lang${lang.toUpperCase()}`).classList.add('active');
        }

        // =============================================
        // ДОБАВЛЕНИЕ УСЛУГИ
        // =============================================
        function addService() {
            const name = document.getElementById('serviceName').value.trim();
            const desc = document.getElementById('serviceDesc').value.trim();
            const price = document.getElementById('servicePrice').value.trim();
            const priceMax = document.getElementById('servicePriceMax').value.trim();

            if (!name || !price) {
                alert('❌ Заполните название и цену!');
                return;
            }

            let services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            
            // Добавляем на текущем языке
            services[currentLang].push({
                name: name,
                desc: desc,
                price: parseInt(price),
                priceMax: parseInt(priceMax) || parseInt(price) + 300
            });

            localStorage.setItem('adminServices', JSON.stringify(services));
            
            // Очищаем поля
            document.getElementById('serviceName').value = '';
            document.getElementById('serviceDesc').value = '';
            document.getElementById('servicePrice').value = '';
            document.getElementById('servicePriceMax').value = '';
            
            loadServices();
            alert('✅ Услуга добавлена!');
        }

        // =============================================
        // РЕДАКТИРОВАНИЕ
        // =============================================
        function editPrice(index) {
            const lang = document.getElementById('langFilter').value;
            let services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            const service = services[lang][index];
            
            const newPrice = prompt(`Новая цена (от) для "${service.name}":`, service.price);
            const newPriceMax = prompt(`Новая цена (до):`, service.priceMax || service.price + 300);
            
            if (newPrice && !isNaN(newPrice)) {
                service.price = parseInt(newPrice);
                service.priceMax = parseInt(newPriceMax) || parseInt(newPrice) + 300;
                localStorage.setItem('adminServices', JSON.stringify(services));
                loadServices();
                alert('✅ Цена обновлена!');
            }
        }

        function editPriceGlobal(lang, index) {
            let services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            const service = services[lang][index];
            
            const newPrice = prompt(`Новая цена для "${service.name}" (${lang.toUpperCase()}):`, service.price);
            
            if (newPrice && !isNaN(newPrice)) {
                service.price = parseInt(newPrice);
                localStorage.setItem('adminServices', JSON.stringify(services));
                loadServices();
                alert('✅ Цена обновлена!');
            }
        }

        function editName(index) {
            const lang = document.getElementById('langFilter').value;
            let services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            const service = services[lang][index];
            
            const newName = prompt(`Введите новое название (${lang.toUpperCase()}):`, service.name);
            
            if (newName && newName.trim()) {
                service.name = newName.trim();
                localStorage.setItem('adminServices', JSON.stringify(services));
                loadServices();
                alert('✅ Название обновлено!');
            }
        }

        function deleteService(index) {
            if (confirm('🗑️ Удалить эту услугу?')) {
                const lang = document.getElementById('langFilter').value;
                let services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
                services[lang].splice(index, 1);
                localStorage.setItem('adminServices', JSON.stringify(services));
                loadServices();
            }
        }

        // =============================================
        // СИНХРОНИЗАЦИЯ С САЙТОМ (ГЛАВНОЕ!)
        // =============================================
        function syncToSite() {
            const services = JSON.parse(localStorage.getItem('adminServices')) || DEFAULT_SERVICES;
            
            // 1. Сохраняем в localStorage для сайта
            localStorage.setItem('sitePrices', JSON.stringify(services));
            
            // 2. Создаем JSON файл для загрузки в репозиторий
            const dataStr = JSON.stringify(services, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            
            // 3. Скачиваем файл
            const a = document.createElement('a');
            a.href = url;
            a.download = `prices-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // 4. Показываем красивое уведомление
            const alertBox = document.getElementById('syncAlert');
            const syncMessage = document.getElementById('syncMessage');
            
            syncMessage.innerHTML = `
                ✅ Файл с ценами скачан!<br>
                📁 Имя файла: ${a.download}<br>
                🔧 Загрузите этот файл в репозиторий как prices.json<br>
                🌐 Или используйте настройки сайта
            `;
            
            alertBox.style.display = 'flex';
            
            // 5. Скрываем через 10 секунд
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 10000);
            
            // 6. Открываем инструкцию
            console.log('✅ Цены синхронизированы:', services);
            console.log('📁 Скачан файл:', a.download);
            console.log('🔧 Загрузите этот файл в корень репозитория как prices.json');
        }

        // =============================================
        // СТАТИСТИКА
        // =============================================
        function loadStats() {
            const db = JSON.parse(localStorage.getItem('cleaningDatabase') || '{"registrations":[], "orders":[]}');
            document.getElementById('totalRegistrations').textContent = db.registrations.length;
            document.getElementById('totalOrders').textContent = db.orders.length;
        }

        // =============================================
        // ЗАГРУЗКА ПРИ СТАРТЕ
        // =============================================
        if (document.getElementById('adminPanel').style.display === 'block') {
            loadServices();
            loadStats();
        }
    </script>
</body>
</html>
